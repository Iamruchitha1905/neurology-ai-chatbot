{% extends "chatbot/base.html" %}
{% load static %}

{% block content %}
<style>
    .landing-hero {
        position: relative;
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
    }

    .hero-image-container {
        position: relative;
        width: 300px;
        height: 300px;
        margin-bottom: 2rem;
        animation: float 6s ease-in-out infinite;
    }

    .hero-image-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 0 30px rgba(56, 189, 248, 0.4));
    }

    .neuro-title {
        font-size: 4rem;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(to right, #ffffff, #38bdf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s forwards 0.5s;
    }

    .neuro-subtitle {
        font-size: 1.25rem;
        color: var(--text-muted);
        max-width: 600px;
        margin: 1.5rem 0 2.5rem;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s forwards 0.8s;
    }

    .get-started-btn {
        padding: 1rem 2.5rem;
        font-size: 1.1rem;
        font-weight: 700;
        color: white;
        background: var(--primary);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s forwards 1.1s, pulseLayer 2s infinite 2s;
    }

    .get-started-btn:hover {
        transform: scale(1.05) translateY(-2px);
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.6);
        background: var(--primary-hover);
    }

    /* Animations */
    @keyframes float {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-20px);
        }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes pulseLayer {
        0% {
            box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4);
        }

        70% {
            box-shadow: 0 0 0 20px rgba(56, 189, 248, 0);
        }

        100% {
            box-shadow: 0 0 0 0 rgba(56, 189, 248, 0);
        }
    }

    /* Grid Background - subtle overlay */
    .grid-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        z-index: -1;
    }
</style>

<div class="landing-hero">
    <div class="grid-bg"></div>

    <div class="hero-image-container">
        <img src="{% static 'images/hero.png' %}" alt="Neurology Brain AI">
    </div>

    <h1 class="neuro-title">Welcome to Neuro Chat</h1>
    <p class="neuro-subtitle">Experience the future of neurology assistance. Powered by integrated AI to provide instant
        insights on brain health and neurological disorders.</p>

    <a href="{% url 'login' %}" class="get-started-btn">
        Get Started
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
    </a>
</div>
{% endblock %}
